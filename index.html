<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Form Desing</title>
        <style>
            body{ /* element Selector */
                /* background-image: linear-gradient(direction, color-stop1, color-stop2, ...); */
                background-image: -webkit-linear-gradient(left,#5bc4e2,#9914e9);
                margin: 0px;
                font-family: Arial, Helvetica, sans-serif;
            }
            .r-form{
                width: 460px;
                height: 450px;
                background-color:#fff;
                margin: 120px auto;
                box-shadow: 0px 0px 5px 5px rgba(0,0,0,0.1);
                padding: 32px;
            }
            .r-form h1{
                text-align: center;
                font-style: italic;
            }
            .r-form-field input{
                display: block;
                width: 99%;
                height: 50px;
                border:1px solid #dbdbdb;
            }
            .r-form-field{
                margin-bottom: 10px;
            }
            .r-form a.btn{
                color:#6d97c9;
                text-decoration: none;
            }
            .r-block{
                display: block;
            }
            .mybtn{
                width: 100%;
                height: 50px;
                margin-top: 30px;
                margin-bottom: 60px;
                background-image: -webkit-linear-gradient(left,#5bc4e2,#9914e9);
            }
            .text-white{
                color:#fff !important;
            }
            .border-0{
                border:none !important;
                box-shadow: 0px 0px 1px 1px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>
        <form class="r-form">
            <a href="#"></a>
            <h1>Form Design</h1>
            <div class="r-form-field">
                <label>Email or Phone</label>
                <input type="text" name="email">
            </div>
            <div class="r-form-field">
                <label>Password</label>
                <input type="password" name="email">
            </div>
            <a href="#" class="btn">Forgot Password ?</a>
            <button type="submit" class="r-block mybtn border-0 text-white">LOGIN</button>
            <div style="text-align: center;">
                <a style="text-decoration: none;color:#333" href="#">Not a member ?</a> <a href="#" class="btn">Signup Now</a>
            </div>
            
        </form>
    </body>
</html>
